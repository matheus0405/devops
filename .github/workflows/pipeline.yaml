name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

  workflow_dispatch: 

jobs:
  testes_unitarios:
    name: "Integração"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Instalação de dependências
        run: pip install -r requirements.txt
      - name: Testes unitários
        run: pytest
  testes_SAST:
    name: "Testes de segurança"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: "Install bandit"
        run: pip install bandit
      - name: "install safety"
        run: pip install safety
      - name: "Bandit Test"
        run: bandit -r .
      #- name: "Safety Test"
      #  run: safety scan
  entrega:
    name: "Docker Hub"
    runs-on: ubuntu-latest
    steps:
      # Baixar conteúdo do repositório
      - uses: actions/checkout@v2

      # Autenticar no Docker Hub
      - name: "Login Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_SECRET }}
      
      # Configura engine de Build e virtualização
      - name: "QEMU"
        uses: docker/setup-qemu-action@v3
      - name: "Buildx"
        uses: docker/setup-buildx-action@v3

      # Build da imagem e envia ao Docker Hub
      - name: "Build e push"
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/tarefas:latest
  prometheus:
    name: "Docker Hub - Prometheus"
    runs-on: ubuntu-latest
    steps:
      # Baixar conteúdo do repositório
      - uses: actions/checkout@v2

      # Autenticar no Docker Hub
      - name: "Login Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_SECRET }}
      
      # Configura engine de Build e virtualização
      - name: "QEMU"
        uses: docker/setup-qemu-action@v3
      - name: "Buildx"
        uses: docker/setup-buildx-action@v3

      # Build da imagem e envia ao Docker Hub
      - name: "Build e push"
        uses: docker/build-push-action@v6
        with:
          push: true
          file: ./Dockerfile.prometheus
          tags: ${{ vars.DOCKERHUB_USERNAME }}/prometheus:latest
